<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotChain Admin Login</title>
  <style>
    :root {
      --bg1: #f4eee3;
      --bg2: #e7ddd0;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2f4858;
      --line: #dfd8cd;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, var(--bg1), var(--bg2));
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(47, 72, 88, 0.12);
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      color: var(--accent);
    }

    p {
      margin: 0 0 16px 0;
      color: var(--muted);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 11px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .error {
      margin-top: 12px;
      min-height: 18px;
      color: var(--danger);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <p>Введите логин и пароль администратора.</p>

    <label for="username">Логин</label>
    <input id="username" autocomplete="username" />

    <label for="password">Пароль</label>
    <input id="password" type="password" autocomplete="current-password" />

    <button id="loginBtn">Войти</button>
    <div class="error" id="error"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const paymentId = Number(params.get("payment_id")) || null;

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("error");
      errorEl.textContent = "";

      if (!username || !password) {
        errorEl.textContent = "Заполните логин и пароль";
        return;
      }

      try {
        const response = await fetch("/api/admin/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, payment_id: paymentId }),
        });

        if (!response.ok) {
          const payload = await response.text();
          throw new Error(payload || `HTTP ${response.status}`);
        }

        const data = await response.json();
        window.location.href = data.redirect_to || "/admin";
      } catch (err) {
        errorEl.textContent = "Неверный логин или пароль";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("password").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        login();
      }
    });
  </script>
</body>
</html>
